name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Run lint
        run: python -m skill_library.quality.lint skills/*

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Generate pack version report
        run: |
          python -c "
          import json, os
          packs = {}
          packs_dir = 'skills'
          for entry in sorted(os.listdir(packs_dir)):
              pack_path = os.path.join(packs_dir, entry, 'pack.json')
              if os.path.exists(pack_path):
                  with open(pack_path) as f:
                      d = json.load(f)
                  packs[entry] = {
                      'version': d.get('version', 'unknown'),
                      'skills': len(d.get('skills', []))
                  }
          report = '## Pack Versions\n\n'
          report += '| Pack | Version | Skills |\n|------|---------|--------|\n'
          for name, info in packs.items():
              report += f'| {name} | v{info[\"version\"]} | {info[\"skills\"]} |\n'
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(report)
          # Also save as artifact
          with open('pack-versions.json', 'w') as f:
              json.dump(packs, f, indent=2)
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            pack-versions.json
