name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Run lint
        run: python -m skill_library.quality.lint skills/*

      - name: Validate pack.json files
        run: |
          python -c "
          import json, sys, os
          packs_dir = 'skills'
          errors = 0
          for entry in os.listdir(packs_dir):
              pack_path = os.path.join(packs_dir, entry, 'pack.json')
              if os.path.exists(pack_path):
                  with open(pack_path) as f:
                      d = json.load(f)
                  for key in ['name', 'version', 'description']:
                      if key not in d:
                          print(f'Missing {key} in {pack_path}')
                          errors += 1
                  if d.get('name') != entry:
                      print(f'Name mismatch in {pack_path}: {d.get(\"name\")} != {entry}')
                      errors += 1
          sys.exit(errors)
          "
